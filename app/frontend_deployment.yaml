kind: Deployment
apiVersion: apps/v1
metadata:
  name: frontend
  namespace: nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend-image
        image: viralpatel489/my-frontend:v1
        ports:
        - containerPort: 80

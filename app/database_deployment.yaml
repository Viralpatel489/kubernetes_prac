apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: nginx
spec:
  selector:
    matchLabels:
      app: mysql

  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
      - name: mysql
        image: mysql:8.0.45-debian
        env:
        - name: MYSQL_ROOT_PASSWORD
          value: "Welcome@123456"
        - name: MYSQL_USER
          value: "app_user"
        - name: MYSQL_PASSWORD
          value: "Welcome@123456"
        - name: MYSQL_DATABASE
          value: "user_data_db"
        ports:
        - containerPort: 3306
        volumeMounts:
        - name: mysql-storage
          mountPath: /var/lib/mysql
      volumes:
      - name: mysql-storage
        persistentVolumeClaim:
          claimName: mysql-pvc
